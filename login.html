<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Admin Login | BasicPosh</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: '#000000',
                'on-primary': '#ffffff',
                secondary: '#5d5f5f',
                background: '#fbf9f9',
                'on-surface': '#1b1c1c',
                'outline-variant': '#c4c7c7',
                'surface-container-low': '#f5f3f3',
                error: '#ba1a1a',
            },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
    },
};
</script>
<style>
body { font-family: 'Inter', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center px-6">
<div class="w-full max-w-md">
<div class="text-center mb-10">
<h1 class="text-3xl font-bold tracking-tight text-primary mb-2">BasicPosh</h1>
<p class="text-secondary text-sm uppercase tracking-widest">Admin Console</p>
</div>
<div class="bg-white border border-outline-variant p-8 shadow-sm">
<h2 class="text-xl font-semibold mb-2">Sign in</h2>
<p class="text-secondary text-sm mb-8">Access the store management dashboard.</p>
<form class="space-y-6" id="login-form">
<div>
<label class="block text-sm font-medium mb-2" for="email">Email</label>
<input class="w-full border border-outline-variant px-4 py-3 focus:ring-1 focus:ring-primary focus:border-primary" id="email" name="email" placeholder="admin@basicposh.com" required type="email" value="admin@basicposh.com">
</div>
<div>
<label class="block text-sm font-medium mb-2" for="password">Password</label>
<input class="w-full border border-outline-variant px-4 py-3 focus:ring-1 focus:ring-primary focus:border-primary" id="password" name="password" placeholder="Enter password" required type="password">
</div>
<p class="hidden text-error text-sm" id="login-error">Invalid email or password. Please try again.</p>
<button class="w-full bg-primary text-on-primary py-3 font-medium uppercase tracking-widest hover:opacity-90 transition-opacity" type="submit">
Sign In
</button>
</form>
<p class="text-xs text-secondary mt-6 text-center">Demo: admin@basicposh.com / admin123</p>
</div>
<a class="inline-flex items-center gap-2 text-secondary text-sm mt-8 hover:text-primary transition-colors" href="index.html">
<span class="material-symbols-outlined text-base">arrow_back</span>
Back to Store
</a>
</div>
<script src="admin.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');
    if (window.BasicPoshAdmin.login(email, password)) {
        window.location.href = 'dashboard.html';
    } else {
        errorEl.classList.remove('hidden');
    }
});
window.BasicPoshAdmin.requireAuth();
</script>
</body>
</html>
